<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NASA Explorer</title>

  <!-- Fontawesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    integrity="sha512-Fo3rlrZj/k7ujTnHg4CGR2D7kSs0v4LLanw2qksYuRlEzO+tcaEPQogQ0KaoGN26/zrn20ImR1DfuLWnOo7aBA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Tailwind CSS -->
  <link href="dist/output.css" rel="stylesheet">

  <!-- Leaflet.js CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
</head>

<body class="text-white bg-gray-900">

  <!-- Header -->
  <header class="w-full m-auto h-20 bg-header flex items-center justify-between px-6 z-50 relative">
    <!-- Logo -->
    <div class="logo flex items-center z-10">
      <div class="bg-gradient-to-r from-blue-600 to-purple-600 text-xl rounded-full p-2">
        <i class="fa-solid fa-rocket"></i>
      </div>
      <span
        class="font-bold text-xl uppercase ml-2 bg-gradient-to-r from-blue-400 to-purple-400 bg-clip-text text-transparent">NASA
        Explorer</span>
    </div>

    <!-- Center Nav -->
    <div class="hidden lg:flex absolute inset-x-0 justify-center pointer-events-none z-0">
      <nav class="pointer-events-auto">
        <ul class="flex space-x-12 text-[17px]">
          <li><a href="index.html" class="hover:text-blue-500 font-semibold duration-300 transition-colors">Home</a></li>
          <li><a href="explorerPage.html" class="hover:text-blue-500 font-semibold duration-300 transition-colors">Explore</a></li>
          <li><a href="about.html" class="hover:text-blue-500 font-semibold duration-300 transition-colors">About</a></li>
        </ul>
      </nav>
    </div>

    <!-- Mobile Menu -->
    <!-- <div class="z-10">
      <i class="fa-solid fa-bars lg:hidden text-2xl cursor-pointer"></i>
    </div> -->
  </header>

  <!-- Map Section -->
  <section class="h-[calc(100vh-5rem)] w-full flex relative overflow-hidden">
    <!-- Map Container -->
    <div class="relative w-full h-full shrink-0">

      <!-- Leaflet Map -->
      <div id="map" class="w-full h-full"></div>

      <!-- Custom Controls -->
      <div class="absolute top-10 left-10 flex flex-col space-y-4 z-[1000]">
        <div id="zoom-in"
          class="w-12 h-12 cursor-pointer hover:bg-gray-600 rounded-xl flex items-center justify-center bg-gray-800 duration-300">
          <i class="fa-solid fa-plus"></i>
        </div>
        <div id="zoom-out"
          class="w-12 h-12 cursor-pointer hover:bg-gray-600 rounded-xl flex items-center justify-center bg-gray-800 duration-300">
          <i class="fa-solid fa-minus"></i>
        </div>
        <div id="reset-view"
          class="w-12 h-12 cursor-pointer hover:bg-gray-600 rounded-xl flex items-center justify-center bg-gray-800 duration-300">
          <i class="fa-solid fa-expand"></i>
        </div>

        <!-- 🌍 Layer Switcher -->
        <div id="layer-switch"
          class="w-12 h-12 cursor-pointer hover:bg-blue-600 rounded-xl flex items-center justify-center bg-blue-500 duration-300"
          title="Switch Layer">
          <i class="fa-solid fa-layer-group"></i>
        </div>
      </div>
    </div>
  </section>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- AOS -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <script>
    AOS.init({ duration: 1000, once: true });

    // 🗺️ Initialize Map
    const map = L.map('map', {
      center: [20, 0],
      zoom: 2,
      zoomControl: false
    });

    window.addEventListener('resize', () => {
      map.invalidateSize();
    });

    // 📅 Default Date
    let currentDate = '2024-07-01';

    // 🛰️ Layer Options Configurations
    const layers = {
      "True Color": {
        id: "MODIS_Terra_CorrectedReflectance_TrueColor",
        format: "jpg",
        matrix: "GoogleMapsCompatible_Level9",
        maxZoom: 9,
        noTime: false
      },
      "Temperature": {
        id: "GHRSST_L4_MUR_Sea_Surface_Temperature",
        format: "png",
        matrix: "GoogleMapsCompatible_Level7",
        maxZoom: 7,
        noTime: false
      },
      "Night Lights": {
        id: "VIIRS_Black_Marble",
        format: "png",
        matrix: "GoogleMapsCompatible_Level8",
        maxZoom: 8,
        noTime: true
      }
    };

    let currentLayerIndex = 0;
    const layerNames = Object.keys(layers);

    function getLayerUrl(layerName, date) {
      const cfg = layers[layerName];
      const timeStr = cfg.noTime ? '2016-01-01' : date; // Use static year for Black Marble
      return `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/${cfg.id}/default/${timeStr}/${cfg.matrix}/{z}/{y}/{x}.${cfg.format}`;
    }

    function getLayerOptions(layerName) {
      const cfg = layers[layerName];
      return {
        attribution: 'Imagery courtesy of NASA EOSDIS...',
        tileSize: 256,
        minZoom: 1,
        maxZoom: cfg.maxZoom,
        noWrap: true
      };
    }

    // 🌍 Create Initial Layer
    let nasaLayer = L.tileLayer(
      getLayerUrl(layerNames[currentLayerIndex], currentDate),
      getLayerOptions(layerNames[currentLayerIndex])
    ).addTo(map);

    // 🔍 Custom Zoom
    document.getElementById('zoom-in').onclick = () => map.zoomIn();
    document.getElementById('zoom-out').onclick = () => map.zoomOut();
    document.getElementById('reset-view').onclick = () => map.setView([20, 0], 2);

    // 🔄 Layer Switch Button
    document.getElementById('layer-switch').addEventListener('click', () => {
      currentLayerIndex = (currentLayerIndex + 1) % layerNames.length;
      const nextLayerName = layerNames[currentLayerIndex];

      map.removeLayer(nasaLayer);
      nasaLayer = L.tileLayer(
        getLayerUrl(nextLayerName, currentDate),
        getLayerOptions(nextLayerName)
      ).addTo(map);

      // 💬 إشعار بسيط بالطبقة الجديدة
      const msg = document.createElement('div');
      msg.textContent = `🌐 Layer: ${nextLayerName}`;
      msg.className = "fixed top-6 right-6 bg-blue-600 px-4 py-2 rounded-lg shadow-lg text-white font-semibold z-[2000]";
      document.body.appendChild(msg);
      setTimeout(() => msg.remove(), 2000);
    });
  </script>
</body>
</html>
